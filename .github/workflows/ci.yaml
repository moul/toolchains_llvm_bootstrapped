name: CI
# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  workflow_call:
concurrency:
  # Cancel previous actions from the same PR or branch except 'main' branch.
  # See https://docs.github.com/en/actions/using-jobs/using-concurrency and https://docs.github.com/en/actions/learn-github-actions/contexts for more info.
  group: concurrency-group::${{ github.workflow }}::${{ github.event.pull_request.number > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}${{ github.ref_name == 'main' && format('::{0}', github.run_id) || ''}}
  cancel-in-progress: ${{ github.ref_name != 'main' }}
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # only test on linux for now, macos is not ready.
        os: [ubuntu-latest, ubuntu-24.04-arm]
        bazel_version: [8.x, last_rc]
        folder:
          - "e2e/rules_cc"
          - "e2e/rules_foreign_cc"
          - "e2e/rules_rust"
          - "e2e/rules_rs"
          - "e2e/cross_compilation"
          - "e2e/wasm"
          - "examples/custom_targets"
        include:
          # Path mapping requires Bazel 9+.
          - bazel_version: last_rc
            folder: "e2e/rules_cc"
            extra_flags: "--experimental_output_paths=strip"
    runs-on: ${{ matrix.os }}

    # Configure a human readable name for each job
    name: Test ${{ matrix.folder }} with Bazel ${{ matrix.bazel_version }} on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # Cache build and external artifacts so that the next ci build is incremental.
      # Because github action caches cannot be updated after a build, we need to
      # store the contents of each build in a unique cache key, then fall back to loading
      # it on the next ci run. We use hashFiles(...) in the key and restore-keys- with
      # the prefix to load the most recent cache for the branch on a cache miss. You
      # should customize the contents of hashFiles to capture any bazel input sources,
      # although this doesn't need to be perfect. If none of the input sources change
      # then a cache hit will load an existing cache and bazel won't have to do any work.
      # In the case of a cache miss, you want the fallback cache to contain most of the
      # previously built artifacts to minimize build time. The more precise you are with
      # hashFiles sources the less work bazel will have to do.
      - name: Mount bazel caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-repo
          key: bazel-cache-${{ matrix.os }}-${{ matrix.bazel_version }}-${{ matrix.folder }}-${{ hashFiles('**/BUILD.bazel', '**/*.bzl', 'MODULE.bazel') }}
          restore-keys: |
            bazel-cache-${{ matrix.os }}-${{ matrix.bazel_version }}-${{ matrix.folder }}

      - name: bazel test //...
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        working-directory: ${{ matrix.folder }}
        shell: bash
        run: |
          bazel \
            --bazelrc=$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc \
            --bazelrc=.bazelrc \
            test \
            --remote_header=x-buildbuddy-api-key=4jtaxdhxtyu4ylxdEwI7 \
            ${{ matrix.extra_flags }} \
            //...

  test_windows:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-11-arm]
        bazel_version: [latest]
        folder:
          - "e2e/rules_cc"
          # - "e2e/rules_foreign_cc" TODO: Current tests only support linux
          # - "e2e/rules_rust" - Need a bazel nightly with https://github.com/bazelbuild/bazel/pull/28038
          - "e2e/cross_compilation"
          # - "e2e/wasm"
    runs-on: ${{ matrix.os }}

    # Configure a human readable name for each job
    name: Test ${{ matrix.folder }} with Bazel ${{ matrix.bazel_version }} on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: bazel test //...
        id: bazel_test
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        working-directory: ${{ matrix.folder }}
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ "${{ matrix.folder }}" == *"cross_compilation"* ]]; then
            EXTRA_ARGS="--//:test_glibc_versions=none"
          fi

          bazel \
            --bazelrc=$GITHUB_WORKSPACE/.github/workflows/ci.bazelrc \
            --bazelrc=.bazelrc \
            --noexperimental_remote_repo_contents_cache \
            test \
            --repository_cache= \
            --repo_contents_cache= \
            --remote_header=x-buildbuddy-api-key=4jtaxdhxtyu4ylxdEwI7 \
            --jobs=100 \
            $EXTRA_ARGS \
            //...

  # Smoke tests for macOS. Only //:main_default, no-remote.
  test_macos:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-15-intel]
        bazel_version: [last_rc]
        folder:
          - "e2e/rules_cc"
          # - "e2e/rules_foreign_cc" TODO: Current tests only support linux
          # - "e2e/rules_rust" - Need a bazel nightly with https://github.com/bazelbuild/bazel/pull/28038
          # - "e2e/cross_compilation"
          # - "e2e/wasm"
    runs-on: ${{ matrix.os }}

    # Configure a human readable name for each job
    name: Test smoke ${{ matrix.folder }} with Bazel ${{ matrix.bazel_version }} on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: bazel build //:main_default
        id: bazel_test
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
        working-directory: ${{ matrix.folder }}
        shell: bash
        run: |
          bazel \
            --bazelrc=.bazelrc \
            build \
            --remote_header=x-buildbuddy-api-key=4jtaxdhxtyu4ylxdEwI7 \
            //:main_default

  llvm_version_analysis:
    strategy:
      fail-fast: false
      matrix:
        # Normal CI covers the current LLVM release. Keep one release for each
        # supported prior LLVM major here.
        llvm_version: ["21.1.8"]
    runs-on: ubuntu-latest
    name: Analyze LLVM ${{ matrix.llvm_version }}

    steps:
      - uses: actions/checkout@v6

      - name: Select LLVM ${{ matrix.llvm_version }}
        env:
          LLVM_VERSION: ${{ matrix.llvm_version }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          module_file = Path("MODULE.bazel")
          module_text = module_file.read_text()
          module_text, replacement_count = re.subn(
              r'^LLVM_VERSION = "[^"]+"$',
              f'LLVM_VERSION = "{os.environ["LLVM_VERSION"]}"',
              module_text,
              count=1,
              flags=re.MULTILINE,
          )
          if replacement_count != 1:
              raise SystemExit("Expected exactly one LLVM_VERSION assignment in MODULE.bazel")
          module_file.write_text(module_text)
          PY

      - name: Analyze LLVM ${{ matrix.llvm_version }} driver
        shell: bash
        run: |
          bazel build --nobuild //toolchain/bootstrap/stage1:llvm

  docs:
    runs-on: macos-15-intel
    name: Verify public docs generation
    steps:
      - uses: actions/checkout@v6

      - name: Ensure Gazelle updated
        shell: bash
        run: |
          bazel \
            run \
            --config=remote \
            --remote_header=x-buildbuddy-api-key=4jtaxdhxtyu4ylxdEwI7 \
            //gazelle:gazelle -- -mode=diff

      - name: Build release docs
        run: |
          docs="$(mktemp -d)"
          targets="$(mktemp)"
          bash ./.github/workflows/build_public_starlark_docs.sh "$targets" "$docs"

  buildifier:
    runs-on: ubuntu-latest
    name: Verify buildifier formatting
    steps:
      - uses: actions/checkout@v6
      - name: Verify buildifier formatting
        shell: bash
        run: |
          bazel \
            run \
            --remote_header=x-buildbuddy-api-key=4jtaxdhxtyu4ylxdEwI7 \
            //internal_tools:buildifier.check
